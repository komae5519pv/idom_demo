# Databricks Apps Configuration for IDOM Car AI
command: ['python', 'app/backend/run.py']

env:
  # Databricks Configuration
  - name: 'DATABRICKS_WAREHOUSE_ID'
    value: '03560442e95cb440'

  # Unity Catalog Configuration
  - name: 'CATALOG'
    value: 'komae_demo_v4'
  - name: 'SCHEMA_NAME'
    value: 'idom_car_ai'

  # LLM Configuration
  - name: 'LLM_MODEL'
    value: 'databricks-claude-sonnet-4'

  # Application Configuration
  - name: 'DEBUG'
    value: 'false'
  - name: 'DEMO_MODE'
    value: 'false'
